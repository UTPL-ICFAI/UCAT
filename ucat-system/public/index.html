<!DOCTYPE html>
<!-- HTML5 document type declaration -->
<html lang="en">
<!-- Root element with English language specification for accessibility -->
<head>
  <!-- Character encoding for proper text rendering -->
  <meta charset="UTF-8">
  <!-- Viewport settings for responsive design across all devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Page title displayed in browser tab -->
  <title>UCAT - Construction Tracker Login</title>
  <!-- Link to global stylesheet for common styles -->
  <link rel="stylesheet" href="css/main.css">
  <!-- Inline styles for login page specific styling -->
  <style>
    /* Reset margins and padding for all elements */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body background and font settings */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FFFFFF;
      color: #333;
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
    }

    /* Main login container with two-column layout */
    .login-container {
      display: flex;
      height: 100vh;
      background: #FFFFFF;
    }

    /* Left panel with dark background and construction imagery */
    .login-left {
      width: 55%;
      background: #1C1C1E;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 60px 50px;
      position: relative;
      overflow: hidden;
    }

    /* Construction scene container using CSS and SVG */
    .construction-scene {
      flex: 1;
      position: relative;
      margin-bottom: 40px;
      height: 300px;
    }

    /* SVG construction imagery styling */
    .construction-scene svg {
      width: 100%;
      height: 100%;
    }

    /* Scaffolding background pattern using repeating CSS */
    .scaffolding-pattern {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: -1;
    }

    /* Left panel content section (UCAT branding) */
    .login-left-content {
      position: relative;
      z-index: 10;
    }

    /* UCAT main logo text */
    .login-logo {
      font-size: 48px;
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    /* Tagline below UCAT text */
    .login-tagline {
      font-size: 18px;
      color: #F5C400;
      font-weight: 500;
      margin-bottom: 12px;
    }

    /* Small descriptive text below tagline */
    .login-description {
      font-size: 14px;
      color: #888;
      line-height: 1.5;
    }

    /* Right panel - pure white login form area */
    .login-right {
      width: 45%;
      background: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    /* Login form card wrapper */
    .login-card {
      width: 100%;
      max-width: 380px;
    }

    /* Icon at top of form (hard hat) */
    .login-icon-container {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    /* SVG hard hat icon styling */
    .hard-hat-icon {
      width: 36px;
      height: 36px;
    }

    /* Form heading - Welcome back text */
    .login-card h1 {
      font-size: 28px;
      font-weight: 600;
      color: #1C1C1E;
      text-align: center;
      margin-bottom: 8px;
    }

    /* Form subheading - Sign in prompt */
    .login-card p {
      font-size: 14px;
      color: #666;
      text-align: center;
      margin-bottom: 32px;
    }

    /* Form group container for input field */
    .form-group {
      margin-bottom: 16px;
    }

    /* Label styling for form inputs */
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 8px;
    }

    /* Input field styling */
    .form-group input {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      font-size: 15px;
      border: 1.5px solid #E0E0E0;
      border-radius: 8px;
      font-family: inherit;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    /* Input focus state with yellow accent */
    .form-group input:focus {
      outline: none;
      border-color: #F5C400;
      box-shadow: 0 0 0 3px rgba(245, 196, 0, 0.15);
    }

    /* Gap between form groups */
    .form-gap {
      height: 24px;
    }

    /* Large gap before submit button */
    .form-gap-large {
      height: 32px;
    }

    /* Login submit button styling */
    .login-button {
      width: 100%;
      height: 50px;
      background: #F5C400;
      color: #1C1C1E;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.1s;
    }

    /* Button hover state with darker yellow */
    .login-button:hover {
      background: #C49A00;
    }

    /* Button active/click state with subtle scale */
    .login-button:active {
      transform: scale(0.99);
    }

    /* Button disabled state */
    .login-button:disabled {
      background: #E0E0E0;
      color: #999;
      cursor: not-allowed;
    }

    /* System info text below button */
    .login-footer {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 16px;
    }

    /* Error message pill badge styling */
    .error-message {
      background: #FFEBEE;
      color: #C62828;
      padding: 10px 16px;
      border-radius: 20px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
      text-align: center;
      border: 1px solid #EF9A9A;
    }

    /* Show error message when class added */
    .error-message.show {
      display: block;
    }

    /* Loading indicator styling */
    .loading {
      display: none;
      text-align: center;
      color: #F5C400;
      margin-top: 16px;
      font-size: 14px;
    }

    /* Show loading indicator when class added */
    .loading.show {
      display: block;
    }

    /* Responsive design for tablets and mobile */
    @media (max-width: 768px) {
      /* Hide construction imagery on small screens */
      .login-left {
        display: none;
      }

      /* Make right panel full width on mobile */
      .login-right {
        width: 100%;
        padding: 20px;
      }

      /* Adjust login card max width for mobile */
      .login-card {
        max-width: 100%;
      }

      /* Reduce left panel padding on small screens */
      .login-left {
        padding: 40px 30px;
      }

      /* Smaller logo on mobile */
      .login-logo {
        font-size: 36px;
      }

      /* Smaller form heading on mobile */
      .login-card h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<!-- Body containing login interface -->
<body>
  <!-- Main login container with two-column split layout -->
  <div class="login-container">
    <!-- Left panel with construction theme and branding -->
    <div class="login-left">
      <!-- Scaffolding pattern background effect -->
      <div class="scaffolding-pattern"></div>

      <!-- Construction scene with SVG imagery -->
      <div class="construction-scene">
        <!-- SVG construction elements (crane, hard hat, site) -->
        <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
          <!-- Horizon line representing site ground -->
          <line x1="0" y1="200" x2="300" y2="200" stroke="#666" stroke-width="2"/>

          <!-- Crane structure - vertical mast -->
          <rect x="140" y="80" width="20" height="120" fill="#DDD"/>
          <!-- Crane horizontal boom -->
          <rect x="100" y="80" width="100" height="12" fill="#DDD"/>
          <!-- Crane hook cable -->
          <line x1="200" y1="92" x2="200" y2="150" stroke="#999" stroke-width="2"/>
          <!-- Crane hook -->
          <circle cx="200" cy="155" r="6" fill="#FFD700"/>

          <!-- Scaffolding grid structure -->
          <g stroke="#888" stroke-width="1" opacity="0.6">
            <!-- Vertical scaffolding poles -->
            <line x1="20" y1="140" x2="20" y2="200"/>
            <line x1="50" y1="140" x2="50" y2="200"/>
            <line x1="80" y1="140" x2="80" y2="200"/>

            <!-- Horizontal scaffolding bars -->
            <line x1="0" y1="160" x2="100" y2="160"/>
            <line x1="0" y1="180" x2="100" y2="180"/>
          </g>

          <!-- Hard hat icon (construction worker safety) -->
          <g>
            <!-- Hard hat dome -->
            <ellipse cx="250" cy="120" rx="20" ry="18" fill="#FFC107"/>
            <!-- Hard hat brim -->
            <ellipse cx="250" cy="135" rx="28" ry="8" fill="#FFB300"/>
            <!-- Head beneath hard hat -->
            <circle cx="250" cy="155" r="10" fill="#DDD"/>
          </g>
        </svg>
      </div>

      <!-- UCAT branding and tagline section -->
      <div class="login-left-content">
        <!-- Main application logo -->
        <div class="login-logo">UCAT</div>
        <!-- Application tagline in yellow -->
        <div class="login-tagline">Construction Analysis Tracker</div>
        <!-- Descriptive tagline -->
        <div class="login-description">Built for the field. Managed from anywhere.</div>
      </div>
    </div>

    <!-- Right panel with login form -->
    <div class="login-right">
      <!-- Login form card -->
      <div class="login-card">
        <!-- Hard hat icon at top of form -->
        <div class="login-icon-container">
          <svg class="hard-hat-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <!-- Hard hat dome -->
            <ellipse cx="50" cy="35" rx="35" ry="30" fill="#FFC107"/>
            <!-- Hard hat brim -->
            <ellipse cx="50" cy="60" rx="45" ry="12" fill="#FFB300"/>
            <!-- Helmet inner line -->
            <ellipse cx="50" cy="35" rx="30" ry="26" fill="none" stroke="#FF9500" stroke-width="2"/>
          </svg>
        </div>

        <!-- Form heading -->
        <h1>Welcome back</h1>
        <!-- Form subheading -->
        <p>Sign in to your UCAT account</p>

        <!-- Login form element -->
        <form id="loginForm">
          <!-- User ID input field -->
          <div class="form-group">
            <!-- User ID label -->
            <label for="userId">User ID</label>
            <!-- User ID text input -->
            <input type="text" id="userId" name="userId" placeholder="Enter your user ID" required>
          </div>

          <!-- Small gap between form groups -->
          <div class="form-gap"></div>

          <!-- Password input field -->
          <div class="form-group">
            <!-- Password label -->
            <label for="password">Password</label>
            <!-- Password masked input -->
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
          </div>

          <!-- Large gap before button -->
          <div class="form-gap-large"></div>

          <!-- Login submit button -->
          <button type="submit" class="login-button" id="loginBtn">Login</button>

          <!-- System information footer text -->
          <div class="login-footer">UCAT System v1.0  |  Secure Login</div>

          <!-- Error message container shown on login failure -->
          <div class="error-message" id="errorMessage"></div>
          <!-- Loading indicator shown during login -->
          <div class="loading" id="loading">Logging in...</div>
        </form>
      </div>
    </div>
  </div>

  <!-- Script for authentication functionality -->
  <script src="js/auth.js"></script>
</body>
</html>
